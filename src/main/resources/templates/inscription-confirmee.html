<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription confirmée</title>

    <!-- Your main stylesheet -->
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body class="auth-body">

<div class="auth-container">

    <div class="auth-brand">
        <div class="brand-icon">⚡</div>
        <div class="brand-name">ChatWave</div>
        <div class="brand-tagline">Validation du compte</div>
    </div>

    <div class="auth-card">

        <!-- ===== SUCCESS ===== -->
        <div th:if="${erreur == null}">

            <div style="font-size:64px; text-align:center; margin-bottom:16px;">
                ✅
            </div>

            <div class="auth-title" style="text-align:center;">
                Inscription confirmée
            </div>

            <div class="alert alert-success">
                Votre compte a été activé avec succès.<br>
                Vous pouvez maintenant vous connecter.
            </div>

            <a href="/auth/login" class="btn btn-primary btn-full" style="margin-top:16px;">
                Se connecter
            </a>

        </div>

        <!-- ===== ERROR ===== -->
        <div th:if="${erreur != null}">

            <div style="font-size:64px; text-align:center; margin-bottom:16px;">
                ⚠️
            </div>

            <div class="auth-title" style="text-align:center;">
                Confirmation échouée
            </div>

            <div class="alert alert-error" th:text="${erreur}">
                Message d'erreur
            </div>

            <a href="/auth/register" class="btn btn-accent btn-full" style="margin-top:16px;">
                Se réinscrire
            </a>

        </div>

    </div>

</div>

</body>
</html>
