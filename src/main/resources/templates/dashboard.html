<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatWave — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="app-body">

<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-logo">⚡ ChatWave</div>
            <form th:action="@{/auth/logout}" method="post">
                <button type="submit" class="btn-logout" title="Logout">→</button>
            </form>
        </div>

        <!-- User ID Card -->
        <div class="user-id-card">
            <div class="user-avatar" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}"></div>
            <div class="user-info">
                <div class="user-name" th:text="${user.username}"></div>
                <div class="user-id-row">
                    <span class="user-public-id" id="publicIdDisplay" th:text="${user.publicId}"></span>
                    <button class="btn-copy" onclick="copyId()" title="Copy your ID">⎘</button>
                </div>
                <div class="copy-hint">Share your ID to receive messages</div>
            </div>
        </div>

        <!-- New Chat -->
        <div class="new-chat-section">
            <p class="section-label">New Conversation</p>
            <div th:if="${error}" class="alert alert-error small" th:text="${error}"></div>
            <form th:action="@{/chat/create}" method="post" class="new-chat-form">
                <input type="text" name="targetPublicId" placeholder="Enter user ID..." class="input-sm" required maxlength="36">
                <button type="submit" class="btn btn-accent btn-sm">Start →</button>
            </form>
        </div>

        <!-- Conversations List -->
        <div class="conversations-section">
            <p class="section-label">Conversations</p>
            <div class="conversation-list">
                <div th:if="${rooms.isEmpty()}" class="empty-state">
                    No conversations yet.<br>Share your ID to get started!
                </div>
                <a th:each="room : ${rooms}"
                   th:href="@{/chat/{id}(id=${room.id})}"
                   class="conversation-item">
                    <div class="conv-avatar" th:text="${#strings.substring(room.otherUsername, 0, 1).toUpperCase()}"></div>
                    <div class="conv-info">
                        <div class="conv-name" th:text="${room.otherUsername}"></div>
                        <div class="conv-preview" th:text="${room.lastMessage}"></div>
                    </div>
                </a>
            </div>
        </div>
    </aside>

    <!-- Main content (empty state) -->
    <main class="chat-main empty">
        <div class="welcome-state">
            <div class="welcome-icon">💬</div>
            <h2>Select a conversation</h2>
            <p>Choose a chat from the sidebar or start a new one by entering a user ID.</p>
        </div>
    </main>
</div>

<script>
    function copyId() {
        const id = document.getElementById('publicIdDisplay').textContent;
        navigator.clipboard.writeText(id).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.textContent = '✓';
            btn.style.color = '#4ade80';
            setTimeout(() => { btn.textContent = '⎘'; btn.style.color = ''; }, 1500);
        });
    }
</script>

</body>
</html>
