<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatWave — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-brand">
        <div class="brand-icon">⚡</div>
        <h1 class="brand-name">ChatWave</h1>
        <p class="brand-tagline">Join the conversation</p>
    </div>

    <div class="auth-card">
        <h2 class="auth-title">Create account</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/auth/register}" method="post" class="auth-form">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="Write Ur Email" required minlength="3" maxlength="50">
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3" maxlength="50">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account? <a th:href="@{/auth/login}">Sign in</a>
        </p>
    </div>
</div>
</body>
</html>
